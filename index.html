<!DOCTYPE html>
<html lang="zh-HK" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港扣账卡境外提款收费对比</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root { --r:16px; --rm:12px; --rs:8px; --gap:14px; --tr:.2s ease; }

[data-theme="light"], :root {
  --bg: #FFF7ED;
  --sticky-bg: #FFF7ED;
  --acc: #F97316;
  --acc2: #FBBF24;
  --text: #431407;
  --t2: #9A3412;
  --t3: #FFEDD5;
  --card: #ffffff;
  --card-bd: rgba(249, 115, 22, 0.15);
  --card-hi: rgba(249, 115, 22, 0.08);
  --card-sh: 0 1px 3px rgba(249,115,22,0.05), 0 6px 28px rgba(249,115,22,0.08);
  --glow: rgba(249, 115, 22, 0.2);
  --sel: rgba(249, 115, 22, 0.08);
  
  --sf-bg: linear-gradient(135deg,#f0fdf4,#dcfce7); --sf-bd: rgba(22,163,74,0.25); --sf-c: #166534; --sf-d: rgba(22,163,74,0.06);
  --sx-bg: linear-gradient(135deg,#fef2f2,#fee2e2); --sx-bd: rgba(220,38,38,0.2);  --sx-c: #991b1b; --sx-d: rgba(220,38,38,0.06);
  --st-bg: linear-gradient(135deg,#fffbeb,#fef3c7); --st-bd: rgba(217,119,6,0.25);  --st-c: #b45309; --st-d: rgba(217,119,6,0.06);
  --sl-bg: linear-gradient(135deg,#eff6ff,#dbeafe); --sl-bd: rgba(37,99,235,0.2);  --sl-c: #1e40af; --sl-d: rgba(37,99,235,0.06);
  --sp-bg: linear-gradient(135deg,#faf5ff,#f3e8ff); --sp-bd: rgba(147,51,234,0.25); --sp-c: #6b21a8; --sp-d: rgba(147,51,234,0.06);
}

/* ── Dark ── */
[data-theme="dark"] {
  --bg: #1c0d02;                             
  --sticky-bg: #1c0d02;
  --acc: #F97316;
  --acc2: #FBBF24;
  --text: #FFEDD5;
  --t2: #FDBA74;
  --t3: #431407;
  --card: rgba(255,255,255,0.03);
  --card-bd: rgba(249,115,22,0.2);
  --card-hi: rgba(249,115,22,0.25);
  --card-sh: 0 10px 40px rgba(0,0,0,0.6);
  --glow: rgba(249, 115, 22, 0.35);
  --sel: rgba(249, 115, 22, 0.15);
  
  --sf-bg: linear-gradient(135deg,rgba(21,128,61,0.25),rgba(21,128,61,0.08)); --sf-bd: rgba(74,222,128,0.2); --sf-c: #4ade80; --sf-d: rgba(74,222,128,0.08);
  --sx-bg: linear-gradient(135deg,rgba(153,27,27,0.25),rgba(153,27,27,0.08)); --sx-bd: rgba(252,165,165,0.2); --sx-c: #fc8181; --sx-d: rgba(252,165,165,0.08);
  --st-bg: linear-gradient(135deg,rgba(146,64,14,0.25),rgba(146,64,14,0.08));  --st-bd: rgba(252,211,77,0.2); --st-c: #fcd34d; --st-d: rgba(252,211,77,0.08);
  --sl-bg: linear-gradient(135deg,rgba(30,64,175,0.25),rgba(30,64,175,0.08));  --sl-bd: rgba(147,197,253,0.2); --sl-c: #93c5fd; --sl-d: rgba(147,197,253,0.08);
  --sp-bg: linear-gradient(135deg,rgba(107,33,168,0.25),rgba(107,33,168,0.08)); --sp-bd: rgba(216,180,254,0.2); --sp-c: #c084fc; --sp-d: rgba(216,180,254,0.08);
}

/* ── Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  background:var(--bg); color:var(--text); min-height:100vh;
  font-family:'Arial','Noto Sans SC',sans-serif;
  transition:background var(--tr),color var(--tr);
  -webkit-font-smoothing:antialiased; line-height:1.5;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 10% -5%, rgba(249,115,22,0.12), transparent 65%),
    radial-gradient(ellipse 55% 45% at 92% 108%, rgba(251,191,36,0.08), transparent 65%);
}
.page{max-width:960px; margin:0 auto; padding:22px 18px 72px; position:relative; z-index:1}

/* ── Card ── */
.card{
  background:var(--card); border:1px solid var(--card-bd);
  border-radius:var(--r); box-shadow:var(--card-sh);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  transition:border-color var(--tr); overflow:hidden;
  margin-bottom:var(--gap);
}
.card:last-child{margin-bottom:0}
.cp{padding:22px}
.card-table{overflow:visible}

/* ════════════════
   HERO
════════════════ */
.hero{padding:30px 28px 24px; position:relative; overflow:hidden}
.hero::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 30% 0%, rgba(249,115,22,0.15), transparent 65%);
}
.hero-top{position:relative; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap}
.hero-badge{
  display:inline-flex; align-items:center; gap:7px;
  font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--acc);
  margin-bottom:10px;
}
.hero-icon{font-size:1.4rem; animation:hf 3s ease-in-out infinite}
@keyframes hf{0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)}}
h1{font-size:clamp(1.5rem,4vw,2.2rem); font-weight:900; letter-spacing:-.03em; line-height:1.15; margin-bottom:8px; font-family:'Arial','Noto Sans SC',sans-serif}
h1 span{background:linear-gradient(130deg,var(--acc),var(--acc2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text}
.hero-sub{font-size:.9rem; color:var(--t2)}
.hero-stats{display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; position:relative}
.stat-pill{
  display:inline-flex; align-items:center; gap:6px; padding:5px 14px;
  border-radius:30px; font-size:.82rem; color:var(--t2);
  background:rgba(249,115,22,0.07); border:1px solid rgba(249,115,22,0.18);
}
.stat-pill strong{color:var(--acc); font-size:.9rem}

/* theme control */
.theme-ctrl{
  display:inline-flex; background:rgba(0,0,0,.06); border:1px solid var(--card-bd);
  border-radius:30px; padding:3px; gap:2px; flex-shrink:0; align-self:flex-start;
}
[data-theme="dark"] .theme-ctrl{background:rgba(0,0,0,.2)}
.th-btn{
  padding:6px 13px; border:none; border-radius:24px; cursor:pointer;
  font-size:.76rem; font-weight:600; background:transparent; color:var(--t2);
  transition:all var(--tr); white-space:nowrap;
}
.th-btn.active{background:var(--acc); color:#fff; box-shadow:0 2px 8px var(--glow)}
.th-btn:hover:not(.active){color:var(--text); background:rgba(249,115,22,.1)}

/* ════════════════
   TABS
════════════════ */
.tabs{
  display:flex; gap:6px; background:var(--card); border:1px solid var(--card-bd);
  border-radius:var(--r); padding:5px; margin-bottom:var(--gap);
  box-shadow:var(--card-sh); backdrop-filter:blur(20px);
}
.tab{
  flex:1; padding:12px 10px; border:none; border-radius:var(--rm); cursor:pointer;
  font-size:.95rem; font-weight:700; transition:all var(--tr);
  background:transparent; color:var(--t2);
  font-family:'Arial','Noto Sans SC',sans-serif;
}
.tab.active{background:linear-gradient(135deg,var(--acc),var(--acc2)); color:#fff; box-shadow:0 2px 14px var(--glow)}
.tab:hover:not(.active){background:rgba(249,115,22,.07); color:var(--text)}
.panel{display:none; animation:fadeUp .25s ease}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ════════════════
   STEP LABEL
════════════════ */
.step{
  display:flex; align-items:center; gap:8px;
  font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.12em;
  color:var(--acc); margin-bottom:14px;
}
.step::before{
  content:''; display:inline-block; width:3px; height:14px;
  background:linear-gradient(to bottom, var(--acc), var(--acc2)); border-radius:2px; flex-shrink:0;
}

/* ════════════════
   BANK GRID
════════════════ */
.bank-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px}
.bank-btn{
  padding:11px 13px; border:1px solid var(--card-bd); border-radius:var(--rm);
  background:rgba(255,255,255,.03); color:var(--t2); cursor:pointer;
  font-size:.9rem; text-align:left; line-height:1.35; transition:all var(--tr);
  font-family:'Arial','Noto Sans SC',sans-serif;
}
[data-theme="light"] .bank-btn{background:rgba(255,255,255,0.6)}
.bank-btn:hover{border-color:rgba(249,115,22,.5); color:var(--text); background:var(--sel); transform:translateY(-1px)}
.bank-btn.active{border-color:var(--acc); background:var(--sel); color:var(--acc); font-weight:700; box-shadow:0 0 0 1px var(--acc) inset}

/* ── TIER ── */
.tier-row{display:flex; flex-wrap:wrap; gap:8px}
.tier-btn{
  padding:9px 18px; border:1px solid var(--card-bd); border-radius:24px;
  background:rgba(255,255,255,.03); color:var(--t2); cursor:pointer;
  font-size:.9rem; font-weight:500; transition:all var(--tr); white-space:nowrap;
  font-family:'Arial','Noto Sans SC',sans-serif;
}
[data-theme="light"] .tier-btn{background:rgba(255,255,255,0.6)}
.tier-btn:hover{border-color:rgba(249,115,22,.5); color:var(--text)}
.tier-btn.active{background:linear-gradient(135deg,var(--acc),var(--acc2)); border-color:transparent; color:#fff; box-shadow:0 2px 12px var(--glow)}

/* ════════════════
   ATM RESULT CARDS
════════════════ */
.atm-bento{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
.atm-cell{
  border-radius:var(--r); border:1px solid; padding:18px;
  min-height:160px; display:flex; flex-direction:column; justify-content:space-between;
  transition:transform var(--tr),box-shadow var(--tr);
  animation:cin .3s ease both;
}
.atm-cell:hover{transform:translateY(-3px); box-shadow:0 8px 28px rgba(0,0,0,.15)}
@keyframes cin{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.atm-cell[data-s="free"]     {background:var(--sf-bg); border-color:var(--sf-bd)}
.atm-cell[data-s="fee"]      {background:var(--sx-bg); border-color:var(--sx-bd)}
.atm-cell[data-s="ftf"]      {background:var(--st-bg); border-color:var(--st-bd)}
.atm-cell[data-s="limited"]  {background:var(--sl-bg); border-color:var(--sl-bd)}
.atm-cell[data-s="currency"] {background:var(--sp-bg); border-color:var(--sp-bd)}
.cell-top{display:flex; align-items:flex-start; justify-content:space-between}
.cell-emoji{font-size:1.5rem}
.cell-emoji.is-svg{
  width:44px;
  height:22px;
  object-fit:contain;
  object-position:left center;
  flex-shrink:0;
}
.cell-name{font-size:.76rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--t2); text-align:right; line-height:1.3}
.cell-si{font-size:2.3rem; line-height:1; margin-bottom:4px}
.cell-st{font-size:.85rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em}
.cell-note{font-size:.74rem; margin-top:4px; line-height:1.4; opacity:.78}
.atm-cell[data-s="free"]     .cell-si,.atm-cell[data-s="free"]     .cell-st{color:var(--sf-c)}
.atm-cell[data-s="fee"]      .cell-si,.atm-cell[data-s="fee"]      .cell-st{color:var(--sx-c)}
.atm-cell[data-s="ftf"]      .cell-si,.atm-cell[data-s="ftf"]      .cell-st{color:var(--st-c)}
.atm-cell[data-s="limited"]  .cell-si,.atm-cell[data-s="limited"]  .cell-st{color:var(--sl-c)}
.atm-cell[data-s="currency"] .cell-si,.atm-cell[data-s="currency"] .cell-st{color:var(--sp-c)}

.result-note{font-size:.84rem; color:var(--t2); margin-top:14px; padding-top:14px; border-top:1px solid var(--card-bd)}
.res-bar{display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px}
.res-chip{
  display:inline-flex; align-items:center; gap:5px; padding:5px 13px;
  background:var(--sel); border:1px solid rgba(249,115,22,.3);
  border-radius:20px; font-size:.84rem; font-weight:600; color:var(--acc);
}
.res-stat{margin-left:auto; font-size:.88rem; color:var(--t2)}
.res-stat strong{color:var(--sf-c)}

/* ── ATM MODE ── */
.sg{margin-bottom:16px} .sg:last-child{margin-bottom:0}
.sg-head{
  display:flex; align-items:center; gap:8px;
  font-size:.76rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
  color:var(--t2); margin-bottom:8px;
}
.sg-line{flex:1; height:1px; background:var(--card-bd)}
.bank-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; border:1px solid var(--card-bd); border-radius:var(--rm);
  margin-bottom:6px; background:rgba(255,255,255,.022);
  transition:all var(--tr); animation:cin .25s ease both;
}
[data-theme="light"] .bank-row{background:rgba(255,255,255,0.5)}
.bank-row:last-child{margin-bottom:0}
.bank-row:hover{border-color:rgba(249,115,22,.35); transform:translateX(3px)}
.br-name{font-size:.9rem; font-weight:500}
.br-name{
  display:flex;
  align-items:center;
  gap:8px;
}
.br-sub{font-size:.78rem; color:var(--t2); margin-top:2px}

/* ── BADGES ── */
.bdg{
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 12px; border-radius:20px; font-size:.82rem; font-weight:700;
  border:1px solid; white-space:nowrap; letter-spacing:.02em;
}
.bdg.free     {background:var(--sf-d); color:var(--sf-c); border-color:var(--sf-bd)}
.bdg.fee      {background:var(--sx-d); color:var(--sx-c); border-color:var(--sx-bd)}
.bdg.ftf      {background:var(--st-d); color:var(--st-c); border-color:var(--st-bd)}
.bdg.limited  {background:var(--sl-d); color:var(--sl-c); border-color:var(--sl-bd)}
.bdg.currency {background:var(--sp-d); color:var(--sp-c); border-color:var(--sp-bd)}

/* ════════════════
   TABLE
════════════════ */
.tbl-outer { overflow-x: auto; isolation: isolate; }
.tbl { 
  width: 100%; 
  border-collapse: separate; 
  border-spacing: 0; 
  font-size: .88rem; 
  table-layout: auto;
}

@media(max-width: 768px) {
  .tbl { 
    min-width: 900px; 
  } 
}

.tbl .sc1, .tbl .sc2 { 
  position: sticky !important; 
  z-index: 10; 
  background-color: var(--sticky-bg) !important; 
}
.tbl thead .sc1, .tbl thead .sc2 { z-index: 11; }
.tbl .sc1 { left: 0; }
.tbl .sc2::after {
  content: ''; position: absolute; top: 0; right: -6px; bottom: 0; width: 6px;
  background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
  pointer-events: none;
}

.tbl th, .tbl td { border-bottom: 1px solid var(--card-bd); }
.tbl th {
  padding: 11px 13px; text-align: left; color: var(--t2); font-weight: 700;
  border-bottom: 2px solid var(--card-bd); font-size: .76rem;
  text-transform: uppercase; letter-spacing: .07em; white-space: nowrap;
}
.tbl td { padding: 11px 13px; vertical-align: middle; }

.tbl tbody tr { transition: background var(--tr); }
.tbl tbody tr:hover td { background: rgba(249,115,22,.04); }
.tbl tbody tr:hover .sc1, .tbl tbody tr:hover .sc2 { 
  background-color: var(--sticky-bg) !important; 
  background-image: linear-gradient(var(--card-hi), var(--card-hi)) !important; 
}

.note-sm { font-size: .74rem; color: var(--t2); margin-top: 3px; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--card-bd); }

/* ── ATM GRID ── */
.atm-sel-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px}
.atm-sel-btn{
  padding:16px 12px; border:1px solid var(--card-bd); border-radius:var(--r);
  background:rgba(255,255,255,.025); color:var(--t2); cursor:pointer;
  font-size:.9rem; font-weight:500; text-align:center; line-height:1.5;
  transition:all var(--tr); font-family:'Arial','Noto Sans SC',sans-serif;
}
[data-theme="light"] .atm-sel-btn{background:rgba(255,255,255,0.6)}
.atm-sel-btn .si{display:block; font-size:1.5rem; margin-bottom:6px}
.atm-sel-btn .si-svg{
  display:block;
  width:56px;
  height:28px;
  margin:0 auto 8px;
  object-fit:contain;
}
.atm-sel-btn .si-pair{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  width:56px;
  height:28px;
  margin:0 auto 8px;
}
.atm-sel-btn .si-pair img{
  width:26px;
  height:26px;
  object-fit:contain;
}
.atm-sel-btn:hover{border-color:rgba(249,115,22,.5); color:var(--text); transform:translateY(-2px); box-shadow:0 5px 18px var(--glow)}
.atm-sel-btn.active{border-color:var(--acc); background:var(--sel); color:var(--acc); font-weight:700}

.icon-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.icon-badge img{
  display:block;
  object-fit:contain;
}
.bank-btn-in{
  display:flex;
  align-items:center;
  gap:10px;
}
.bank-logo{
  width:34px;
  height:34px;
  padding:4px;
  border-radius:10px;
  background:rgba(255,255,255,.85);
  border:1px solid rgba(249,115,22,.16);
  box-shadow:0 1px 6px rgba(67,20,7,.06);
}
[data-theme="dark"] .bank-logo{
  background:rgba(255,255,255,.08);
}
.bank-logo img{
  width:100%;
  height:100%;
}
.res-chip-logo{
  width:22px;
  height:22px;
  display:inline-block;
  vertical-align:middle;
  object-fit:contain;
}
.res-chip-logo-pair{
  display:inline-flex;
  align-items:center;
  gap:2px;
  vertical-align:middle;
}
.res-chip-logo-pair img{
  width:18px;
  height:18px;
  object-fit:contain;
}
.res-chip-logo img{
  width:100%;
  height:100%;
}
.cell-emoji-pair{
  display:flex;
  align-items:center;
  gap:4px;
  width:44px;
  height:22px;
  flex-shrink:0;
}
.cell-emoji-pair img{
  width:20px;
  height:20px;
  object-fit:contain;
}
.tbl-bank-cell{
  display:flex;
  align-items:center;
  gap:8px;
}
.tbl-bank-logo{
  width:24px;
  height:24px;
  padding:3px;
  border-radius:7px;
  background:rgba(255,255,255,.85);
  border:1px solid rgba(249,115,22,.16);
}
[data-theme="dark"] .tbl-bank-logo{
  background:rgba(255,255,255,.08);
}
.tbl-bank-logo img{
  width:100%;
  height:100%;
}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  h1{font-size:1.4rem}
  .atm-bento{grid-template-columns:repeat(2,1fr)}
  .bank-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .tab{font-size:.82rem; padding:10px 6px}
  .tbl{font-size:.8rem}
  .tbl th,.tbl td{padding:8px 9px}
}
@media(max-width:400px){
  .atm-bento{grid-template-columns:1fr 1fr}
  .tabs{flex-direction:column}
}
</style>
</head>
<body>
<div class="page">

<div class="card hero">
  <div class="hero-top">
    <div>
      <div class="hero-badge">
        <span class="hero-icon">🏧</span>
        Hong Kong Debit Card
      </div>
      <h1>香港扣账卡<span>境外提款</span>收费对比</h1>
      <p class="hero-sub">根据各银行公开资料整理，仅供参考，请以银行官网为准</p>
    </div>
    <div class="theme-ctrl" id="theme-ctrl">
      <button class="th-btn" onclick="setTheme('light')" data-m="light">☀️ 浅色</button>
      <button class="th-btn" onclick="setTheme('auto')"  data-m="auto">⚙️ 自动</button>
      <button class="th-btn" onclick="setTheme('dark')"  data-m="dark">🌙 深色</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('bank')"  data-t="bank">🏦 按银行查找</button>
  <button class="tab"        onclick="switchTab('atm')"   data-t="atm">📍 按ATM类型查找</button>
  <button class="tab"        onclick="switchTab('table')" data-t="table">📊 完整对比表</button>
</div>

<div id="pnl-bank" class="panel active">
  <div class="card cp">
    <div class="step">Step 1 — 选择银行</div>
    <div class="bank-grid" id="bank-grid"></div>
  </div>
  <div class="card cp" id="tier-card" style="display:none">
    <div class="step">Step 2 — 选择户口类别</div>
    <div class="tier-row" id="tier-row"></div>
  </div>
  <div class="card cp" id="bank-res-card" style="display:none">
    <div class="step">Step 3 — 各ATM收费情况</div>
    <div class="res-bar" id="bank-res-bar"></div>
    <div class="atm-bento" id="atm-bento"></div>
    <div class="result-note" id="bank-res-note" style="display:none"></div>
    <div class="legend" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--card-bd)">
      <span class="bdg free">✓ 免费</span>
      <span class="bdg currency">◇ 限指定币种免费</span>
      <span class="bdg limited">◑ 限指定ATM免费</span>
      <span class="bdg ftf">△ 有FTF存在</span>
      <span class="bdg fee">✗ 收费</span>
    </div>
  </div>
</div>

<div id="pnl-atm" class="panel">
  <div class="card cp">
    <div class="step">Step 1 — 选择ATM类型</div>
    <div class="atm-sel-grid" id="atm-grid"></div>
  </div>
  <div class="card cp" id="atm-res-card" style="display:none">
    <div class="step">Step 2 — 支持免费提款的银行</div>
    <div class="res-bar" id="atm-res-bar"></div>
    <div id="atm-res-list"></div>
  </div>
</div>

<div id="pnl-table" class="panel">
  <div class="card card-table cp">
    <div class="tbl-outer">
      <div id="tbl-content"></div>
    </div>
    <div class="legend">
      <span class="bdg free">✓ 免费</span>
      <span class="bdg currency">◇ 限指定币种免费</span>
      <span class="bdg limited">◑ 限指定ATM免费</span>
      <span class="bdg ftf">△ FTF</span>
      <span class="bdg fee">✗ 收费</span>
    </div>
  </div>
</div>

<script>
// ── Theme ─────────────────────────────────────────────
const mq = window.matchMedia('(prefers-color-scheme: dark)');
let themeMode = localStorage.getItem('theme') || 'light';
function applyTheme() {
  const dark = themeMode === 'dark' || (themeMode === 'auto' && mq.matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.querySelectorAll('#theme-ctrl .th-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.m === themeMode));
}
function setTheme(m) { themeMode = m; localStorage.setItem('theme', m); applyTheme(); }
mq.addEventListener('change', () => { if (themeMode === 'auto') applyTheme(); });
applyTheme();

// ── Data ─────────────────────────────────────────────
const ATM_TYPES = [
  { key:'hkBankTong',    label:'香港银通', icon:'icon/Jetco_logo.svg', iconKind:'svg' },
  { key:'hkHSBCHS',      label:'香港汇丰/恒生', icons:['icon/汇丰银行.svg','icon/Hang_Seng_Bank.svg'], iconKind:'pair' },
  { key:'macauBankTong', label:'澳门银通', icon:'icon/Jetco_logo.svg', iconKind:'svg' },
  { key:'macauOther',    label:'澳门其他', icon:'icon/Flag_of_Macau.svg', iconKind:'svg' },
  { key:'mainland',      label:'内地ATM', icon:'icon/UnionPay_logo.svg', iconKind:'svg' },
  { key:'overseas',      label:'境外ATM', icon:'✈️', iconKind:'emoji' },
];
const BANK_LOGOS = {
  hsbc: 'icon/汇丰银行.svg',
  hase: 'icon/Hang_Seng_Bank.svg',
  bochk: 'icon/中国银行.svg',
  scb: 'icon/渣打银行.svg',
  bea: 'icon/东亚银行.svg',
  dahsing: 'icon/大新银行.svg',
  cncbi: 'icon/中信银行.svg',
  citi: 'icon/花旗银行.svg',
  dbs: 'icon/星展银行.svg',
  za: 'icon/ZA_Bank_logo.svg',
  airstar: 'icon/象象银行.png',
  welab: 'icon/汇立银行.png',
  mox: 'icon/Mox Bank.png',
  bdo: 'icon/东莞银行.svg',
};
const BANKS = [
  { id:'hsbc', name:'汇丰银行', tiers:[
    { label:'普通客户', fees:{ hkBankTong:{s:'fee'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'fee'}, macauOther:{s:'limited',n:'仅汇丰ATM免费'}, mainland:{s:'limited',n:'仅汇丰恒生ATM免费'}, overseas:{s:'limited',n:'仅汇丰ATM免费'} }, note:'不含ATM Fee' },
    { label:'卓越理财', fees:{ hkBankTong:{s:'fee'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'free'}, macauOther:{s:'free'}, mainland:{s:'free'}, overseas:{s:'free'} }, note:'不含ATM Fee' },
    { label:'卓越理财尊尚/环球私人银行', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'free'}, macauOther:{s:'free'}, mainland:{s:'free'}, overseas:{s:'free'} }, note:'包含ATM Fee' },
  ]},
  { id:'hase', name:'恒生银行', tiers:[
    { label:'普通客户', fees:{hkBankTong:{s:'fee'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'fee'}, macauOther:{s:'limited',n:'仅汇丰ATM免费'}, mainland:{s:'limited',n:'仅汇丰恒生ATM免费'}, overseas:{s:'limited',n:'仅汇丰ATM免费'} }, note:'不含ATM Fee' },
    { label:'优越理财', fees:{ hkBankTong:{s:'fee'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'free'}, macauOther:{s:'free'}, mainland:{s:'free'}, overseas:{s:'free'} }, note:'不含ATM Fee' },
    { label:'优越私人理财/私人银行', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'free'}, macauOther:{s:'free'}, mainland:{s:'free'}, overseas:{s:'free'} }, note:'包含ATM Fee' },
  ]},
  { id:'bochk', name:'中国银行（香港）', tiers:[
    { label:'所有客户',    fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'fee'}, macauOther:{s:'free'}, mainland:{s:'fee'}, overseas:{s:'free'} }},
  ]},
  { id:'scb', name:'渣打银行', tiers:[
    { label:'普通客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'fee'}, macauOther:{s:'fee'}, mainland:{s:'fee'}, overseas:{s:'fee'} }},
    { label:'Premium理财及以上', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'free'}, macauOther:{s:'ftf',n:'免手续费但有FTF'}, mainland:{s:'free'}, overseas:{s:'currency',n:'仅限支援货币：港元、美元、人民币、澳元、加元、瑞士法郎、欧元、英镑、日元、新西兰元、新加坡元'} }},
  ]},
  { id:'bea', name:'东亚银行', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'ftf',n:'不明确是否收费，且有FTF'}, macauOther:{s:'ftf',n:'免手续费但有FTF'}, mainland:{s:'free'}, overseas:{s:'currency',n:'仅限支援货币：港元、美元、人民币、澳元、加元、瑞士法郎、欧元、英镑、日元、新西兰元、新加坡元'} }},
  ]},
  { id:'dahsing', name:'大新银行', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'ftf',n:'免手续费但有FTF'}, macauOther:{s:'ftf',n:'免手续费但有FTF'}, mainland:{s:'free'}, overseas:{s:'currency',n:'仅限支援货币：港元、美元、人民币、澳元、加元、瑞士法郎、欧元、英镑、日元、新西兰元、新加坡元'} }},
  ]},
  { id:'cncbi', name:'信银国际', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'free'}, macauBankTong:{s:'free'}, macauOther:{s:'free'}, mainland:{s:'free'}, overseas:{s:'currency',n:'仅限支援货币：港元、美元、人民币、澳元、加元、瑞士法郎、欧元、英镑、日元、新西兰元、新加坡元'} }},
  ]},
  { id:'citi', name:'花旗银行', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'ftf',n:'免手续费但有FTF'}, macauOther:{s:'ftf',n:'免手续费但有FTF'}, mainland:{s:'free'}, overseas:{s:'currency',n:'仅限支援货币：港元、美元、人民币、澳元、加元、瑞士法郎、欧元、英镑、日元、新西兰元、新加坡元、泰铢'} }},
  ]},
  { id:'dbs', name:'星展银行', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'fee'}, macauOther:{s:'fee'}, mainland:{s:'fee'}, overseas:{s:'fee'} }},
  ]},
  { id:'za', name:'众安银行', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free',n:'每月80000 HKD免费额度，超出收取1%手续费'}, hkHSBCHS:{s:'free',n:'每月80000 HKD免费额度，超出收取1%手续费'}, macauBankTong:{s:'fee'}, macauOther:{s:'fee'}, mainland:{s:'fee'}, overseas:{s:'fee'} }},
  ]},
  { id:'airstar', name:'象象银行', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'fee'}, macauOther:{s:'fee'}, mainland:{s:'fee'}, overseas:{s:'fee'} }},
  ]},
  { id:'welab', name:'汇立银行', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'fee'}, macauOther:{s:'fee'}, mainland:{s:'fee'}, overseas:{s:'fee'} }},
  ]},
  { id:'mox', name:'  Mox Bank', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'fee'}, macauOther:{s:'fee'}, mainland:{s:'fee'}, overseas:{s:'fee'} }},
  ]},
  { id:'bdo', name:'东莞银行（国际）', tiers:[
    { label:'所有客户', fees:{ hkBankTong:{s:'free'}, hkHSBCHS:{s:'fee'}, macauBankTong:{s:'fee'}, macauOther:{s:'fee'}, mainland:{s:'fee'}, overseas:{s:'fee'} }},
  ]},
];

// 修正映射字典，新增 currency 紫色状态
const SI = { free:'✓', fee:'✗', ftf:'△', limited:'◑', currency:'◇' };
const SL = { free:'免费', fee:'收费', ftf:'FTF', limited:'限指定ATM免费', currency:'限指定币种免费' };
const SO = ['free','currency','limited','ftf','fee']; 
const GL = { free:'✓ 免费', currency:'◇ 限指定币种免费', limited:'◑ 限指定ATM免费', ftf:'△ FTF', fee:'✗ 收费' };

function renderAtmIcon(atm, className = '') {
  if (atm.iconKind === 'pair') {
    return `<span class="${className}">${atm.icons.map(src => `<img src="${src}" alt="${atm.label}">`).join('')}</span>`;
  }
  if (atm.iconKind === 'svg') {
    return `<img src="${atm.icon}" alt="${atm.label}" class="${className}">`;
  }
  return `<span class="${className}">${atm.icon}</span>`;
}

function renderBankLogo(bank, className = 'bank-logo') {
  const src = BANK_LOGOS[bank.id];
  if (!src) return '';
  return `<span class="${className}"><img src="${src}" alt="${bank.name}"></span>`;
}

// ── Tab switching ─────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.t === id));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('pnl-' + id).classList.add('active');
  if (id === 'table') renderTable();
}

// ── Panel 1: Bank ─────────────────────────────────────
let curBank = null, curTier = null;

function initBankGrid() {
  document.getElementById('bank-grid').innerHTML = BANKS.map(b =>
    `<button class="bank-btn" data-id="${b.id}" onclick="selBank('${b.id}')"><span class="bank-btn-in">${renderBankLogo(b)}<span>${b.name}</span></span></button>`
  ).join('');
}

function selBank(id) {
  curBank = BANKS.find(b => b.id === id);
  curTier = curBank.tiers.length === 1 ? curBank.tiers[0] : null;
  document.querySelectorAll('.bank-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  const tc = document.getElementById('tier-card');
  if (curBank.tiers.length > 1) {
    tc.style.display = '';
    document.getElementById('tier-row').innerHTML = curBank.tiers.map((t, i) =>
      `<button class="tier-btn" onclick="pickTier(${i})">${t.label}</button>`).join('');
    document.getElementById('bank-res-card').style.display = 'none';
  } else {
    tc.style.display = 'none';
    renderBankResult();
  }
  setTimeout(() => document.getElementById('tier-card').style.display !== 'none'
    ? document.getElementById('tier-card').scrollIntoView({behavior:'smooth',block:'nearest'})
    : document.getElementById('bank-res-card').scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}

function pickTier(i) {
  curTier = curBank.tiers[i];
  document.querySelectorAll('.tier-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  renderBankResult();
  setTimeout(() => document.getElementById('bank-res-card').scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}

function renderBankResult() {
  if (!curTier) return;
  document.getElementById('bank-res-card').style.display = '';
  const fc = ATM_TYPES.filter(a => (curTier.fees[a.key]||{s:'fee'}).s === 'free').length;
  document.getElementById('bank-res-bar').innerHTML =
    `<span class="res-chip">${renderBankLogo(curBank, 'res-chip-logo')}${curBank.name}</span>
     <span class="res-chip">${curTier.label}</span>
     <span class="res-stat">免费覆盖 <strong>${fc}</strong> / ${ATM_TYPES.length} 类ATM</span>`;
  document.getElementById('atm-bento').innerHTML = ATM_TYPES.map(a => {
    const f = curTier.fees[a.key] || {s:'fee'};
    return `<div class="atm-cell" data-s="${f.s}">
      <div class="cell-top">${renderAtmIcon(a, a.iconKind === 'pair' ? 'cell-emoji-pair' : (a.iconKind === 'svg' ? 'cell-emoji is-svg' : 'cell-emoji'))}<span class="cell-name">${a.label}</span></div>
      <div>
        <div class="cell-si">${SI[f.s]||'?'}</div>
        <div class="cell-st">${SL[f.s]||f.s}</div>
        ${f.n ? `<div class="cell-note">${f.n}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  const noteEl = document.getElementById('bank-res-note');
  if (curTier.note) { noteEl.textContent = '备注：' + curTier.note; noteEl.style.display = ''; }
  else noteEl.style.display = 'none';
}

// ── Panel 2: ATM ──────────────────────────────────────
let curAtm = null;

function initAtmGrid() {
  document.getElementById('atm-grid').innerHTML = ATM_TYPES.map(a =>
    `<button class="atm-sel-btn" data-key="${a.key}" onclick="selAtm('${a.key}')">${renderAtmIcon(a, a.iconKind === 'pair' ? 'si-pair' : (a.iconKind === 'svg' ? 'si-svg' : 'si'))}${a.label}</button>`
  ).join('');
}

function selAtm(key) {
  curAtm = key;
  document.querySelectorAll('.atm-sel-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  renderAtmResult();
  setTimeout(() => document.getElementById('atm-res-card').scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}

function renderAtmResult() {
  document.getElementById('atm-res-card').style.display = '';
  const atm = ATM_TYPES.find(a => a.key === curAtm);
  const rows = [];
  BANKS.forEach(bank => bank.tiers.forEach(tier => {
    const f = tier.fees[curAtm] || {s:'fee'};
    rows.push({ bname: bank.name, logo: renderBankLogo(bank, 'res-chip-logo'), sub: bank.tiers.length > 1 ? tier.label : '', note: f.n||'', f, s: f.s });
  }));
  rows.sort((a, b) => SO.indexOf(a.s) - SO.indexOf(b.s));
  const fc = rows.filter(r => r.s === 'free').length;
  document.getElementById('atm-res-bar').innerHTML =
    `<span class="res-chip">${renderAtmIcon(atm, atm.iconKind === 'pair' ? 'res-chip-logo-pair' : (atm.iconKind === 'svg' ? 'res-chip-logo' : ''))} ${atm.label}</span>
     <span class="res-stat"><strong>${fc}</strong> 家银行/户口免费</span>`;
  const grp = {}; SO.forEach(s => grp[s] = []);
  rows.forEach(r => grp[r.s].push(r));
  document.getElementById('atm-res-list').innerHTML = SO.filter(s => grp[s].length).map(s =>
    `<div class="sg">
      <div class="sg-head"><span>${GL[s]}</span><span class="sg-line"></span><span>${grp[s].length} 家</span></div>
      ${grp[s].map(r => `<div class="bank-row">
        <div>
          <div class="br-name">${r.logo || ''}${r.bname}</div>
          ${r.sub  ? `<div class="br-sub">${r.sub}</div>` : ''}
          ${r.note ? `<div class="br-sub">${r.note}</div>` : ''}
        </div>
        <span class="bdg ${r.s}">${SI[r.s]} ${SL[r.s]}</span>
      </div>`).join('')}
    </div>`
  ).join('');
}

// ── Panel 3: Table ────────────────────────────────────
let tableRendered = false;
function renderTable() {
  if (!tableRendered) {
    tableRendered = true;
    const heads = ATM_TYPES.map(a => `<th>${renderAtmIcon(a, a.iconKind === 'pair' ? 'res-chip-logo-pair' : (a.iconKind === 'svg' ? 'res-chip-logo' : ''))} ${a.label}</th>`).join('');
    const rows = [];
    BANKS.forEach(bank => bank.tiers.forEach((tier, ti) => {
      const bc = ti === 0
        ? `<td rowspan="${bank.tiers.length}" class="sc1" style="font-weight:700;border-right:1px solid var(--card-bd);white-space:nowrap"><span class="tbl-bank-cell">${renderBankLogo(bank, 'tbl-bank-logo')}<span>${bank.name}</span></span></td>`
        : '';
      
      const tc = `<td class="sc2" style="font-size:.82rem;color:var(--t2);border-right:1px solid var(--card-bd);white-space:nowrap">${tier.label}</td>`;
      
      const fc = ATM_TYPES.map(a => {
        const f = tier.fees[a.key] || {s:'fee'};
        return `<td><span class="bdg ${f.s}">${SI[f.s]} ${SL[f.s]}</span>${f.n?`<div class="note-sm">${f.n}</div>`:''}</td>`;
      }).join('');
      rows.push(`<tr>${bc}${tc}${fc}</tr>`);
    }));

    document.getElementById('tbl-content').innerHTML =
      `<table class="tbl"><thead><tr><th class="sc1">银行</th><th class="sc2">户口类别</th>${heads}</tr></thead><tbody>${rows.join('')}</tbody></table>`;
  }
  
  setTimeout(() => {
    const col1 = document.querySelector('#tbl-content .sc1');
    if (col1) {
      const w = col1.offsetWidth;
      document.querySelectorAll('#tbl-content .sc2').forEach(el => el.style.left = w + 'px');
    }
  }, 50);
}

initBankGrid();
initAtmGrid();
</script>
</div>
</body>
</html>
